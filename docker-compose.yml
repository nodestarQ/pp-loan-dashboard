name: huddle

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: huddle
      PONDER_DB_PASSWORD: ${PONDER_DB_PASSWORD:?PONDER_DB_PASSWORD is required in .env}
      WEB_DB_PASSWORD: ${WEB_DB_PASSWORD:?WEB_DB_PASSWORD is required in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d huddle"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - huddle_net

  indexer:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    # Only the indexer sees PONDER_RPC_URL_1. The web service must never
    # declare this variable: containment is enforced structurally, not
    # by convention.
    environment:
      PONDER_RPC_URL_1: ${PONDER_RPC_URL_1:?PONDER_RPC_URL_1 is required in .env}
      PONDER_RPC_URL_2: ${PONDER_RPC_URL_2:-}
      PONDER_RPC_URL_3: ${PONDER_RPC_URL_3:-}
      DATABASE_URL: postgres://ponder_rw:${PONDER_DB_PASSWORD}@postgres:5432/huddle
      # Ponder 0.16+ requires an explicit schema in production mode.
      # Using "public" so web_ro's SELECT (granted via init.sh default
      # privileges on ponder_rw's future tables) picks up holder/loan
      # without needing a second migration.
      DATABASE_SCHEMA: public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - huddle_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgres://web_ro:${WEB_DB_PASSWORD}@postgres:5432/huddle
      PUBLIC_GOAL_TARGET: ${PUBLIC_GOAL_TARGET:-100}
      PONDER_URL: http://indexer:42069
      ENS_RPC_URL: ${ENS_RPC_URL:-}
      PORT: "3000"
      HOST: 0.0.0.0
      ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - huddle_net

networks:
  huddle_net:
    driver: bridge

volumes:
  pgdata:
